<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>ZGROUP — Acceso al Sistema</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0D0D0D;
  --surface:#161616;
  --card:#1E1E1E;
  --card2:#242424;
  --border:#00E5FF;
  --border-dim:#1E3040;
  --cyan:#00E5FF;
  --amber:#FFD700;
  --green:#00E87A;
  --red:#FF5252;
  --violet:#CE93D8;
  --text:#FFFFFF;
  --muted:#7A9BB5;
  --muted2:#4A6070;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif}

/* ── Grid noise background ────────────────────────────────────── */
body::before{
  content:'';
  position:fixed;inset:0;z-index:0;
  background-image:
    linear-gradient(rgba(0,229,255,.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,229,255,.03) 1px, transparent 1px);
  background-size:40px 40px;
  pointer-events:none;
}
body::after{
  content:'';
  position:fixed;inset:0;z-index:0;
  background:radial-gradient(ellipse 80% 60% at 50% 0%, rgba(0,229,255,.06) 0%, transparent 70%);
  pointer-events:none;
}

/* ── Layout ──────────────────────────────────────────────────── */
.login-container{
  position:relative;z-index:1;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:24px;
}

/* ── Card ────────────────────────────────────────────────────── */
.login-card{
  width:100%;max-width:400px;
  background:var(--card);
  border:1px solid var(--border-dim);
  border-radius:16px;
  padding:40px;
  box-shadow:0 0 60px rgba(0,229,255,.07), 0 24px 48px rgba(0,0,0,.5);
  animation:cardIn .4s cubic-bezier(.22,1,.36,1) both;
}

@keyframes cardIn{
  from{opacity:0;transform:translateY(20px)}
  to{opacity:1;transform:translateY(0)}
}

/* ── Logo ────────────────────────────────────────────────────── */
.logo-wrap{
  display:flex;align-items:center;justify-content:center;gap:14px;
  margin-bottom:36px;
}
.logo-hex{
  width:52px;height:52px;
  border:1.5px solid rgba(0,229,255,.5);
  border-radius:12px;
  background:rgba(0,229,255,.06);
  display:flex;align-items:center;justify-content:center;
  position:relative;
  flex-shrink:0;
}
.logo-hex::before{
  content:'';
  position:absolute;top:-1px;right:-1px;
  width:9px;height:9px;border-radius:50%;
  background:var(--cyan);
  box-shadow:0 0 8px var(--cyan);
  animation:pulse 2.2s ease-in-out infinite;
}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.8)}}

.logo-text{
  display:flex;flex-direction:column;gap:2px;
}
.logo-name{
  font-family:'Rajdhani',sans-serif;font-weight:700;
  font-size:26px;letter-spacing:5px;color:var(--cyan);line-height:1;
}
.logo-sub{
  font-family:'JetBrains Mono',monospace;font-size:9px;
  letter-spacing:3px;color:var(--muted);
  text-transform:uppercase;
}

/* ── Divider ─────────────────────────────────────────────────── */
.divider{
  height:1px;background:linear-gradient(90deg,transparent,var(--border-dim),transparent);
  margin:0 0 28px;
}

/* ── Form ────────────────────────────────────────────────────── */
.form-label{
  font-family:'JetBrains Mono',monospace;font-size:10px;
  letter-spacing:1.5px;color:var(--muted);text-transform:uppercase;
  display:block;margin-bottom:8px;
}
.form-input{
  width:100%;
  background:var(--card2);
  border:1.5px solid var(--border-dim);
  color:var(--text);
  padding:11px 14px;
  border-radius:8px;
  outline:none;
  font-family:'JetBrains Mono',monospace;font-size:13px;
  transition:border-color .2s, box-shadow .2s;
}
.form-input:focus{
  border-color:var(--cyan);
  box-shadow:0 0 0 3px rgba(0,229,255,.12);
}
.form-input::placeholder{color:var(--muted2)}

.form-group{margin-bottom:20px;position:relative}

/* ── Password toggle ─────────────────────────────────────────── */
.pwd-wrap{position:relative}
.pwd-toggle{
  position:absolute;right:12px;top:50%;transform:translateY(-50%);
  background:none;border:none;cursor:pointer;color:var(--muted);
  display:flex;align-items:center;justify-content:center;
  padding:4px;transition:color .15s;
}
.pwd-toggle:hover{color:var(--cyan)}

/* ── Button ──────────────────────────────────────────────────── */
.btn-login{
  width:100%;padding:13px;margin-top:8px;
  background:rgba(0,229,255,.12);
  border:1.5px solid var(--cyan);
  color:var(--cyan);
  font-family:'Rajdhani',sans-serif;font-weight:700;
  font-size:15px;letter-spacing:3px;
  border-radius:8px;cursor:pointer;
  transition:all .2s;
  position:relative;overflow:hidden;
}
.btn-login::before{
  content:'';
  position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(0,229,255,.15),transparent);
  opacity:0;transition:opacity .2s;
}
.btn-login:hover:not(:disabled)::before{opacity:1}
.btn-login:hover:not(:disabled){
  background:rgba(0,229,255,.2);
  box-shadow:0 0 24px rgba(0,229,255,.2);
  transform:translateY(-1px);
}
.btn-login:active{transform:translateY(0)}
.btn-login:disabled{opacity:.5;cursor:not-allowed;transform:none}
.btn-login.loading .btn-label{opacity:0}
.btn-login.loading::after{
  content:'';
  position:absolute;top:50%;left:50%;
  width:18px;height:18px;
  margin:-9px 0 0 -9px;
  border:2px solid rgba(0,229,255,.3);
  border-top-color:var(--cyan);
  border-radius:50%;
  animation:spin .7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Error / Info messages ───────────────────────────────────── */
.msg{
  padding:10px 14px;border-radius:8px;
  font-family:'JetBrains Mono',monospace;font-size:12px;
  margin-top:16px;display:none;
  animation:fadeIn .2s ease;
}
.msg.show{display:block}
.msg.error{background:rgba(255,82,82,.1);border:1px solid rgba(255,82,82,.4);color:var(--red)}
.msg.info{background:rgba(0,229,255,.08);border:1px solid rgba(0,229,255,.25);color:var(--cyan)}
.msg.warning{background:rgba(255,215,0,.08);border:1px solid rgba(255,215,0,.3);color:var(--amber)}
@keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}

/* ── Footer info ─────────────────────────────────────────────── */
.login-footer{
  margin-top:28px;
  text-align:center;
  font-family:'JetBrains Mono',monospace;font-size:10px;
  color:var(--muted2);letter-spacing:1px;
}

/* ── Version badge ───────────────────────────────────────────── */
.version-badge{
  position:fixed;bottom:16px;right:16px;z-index:10;
  font-family:'JetBrains Mono',monospace;font-size:9px;
  letter-spacing:1.5px;color:var(--muted2);
  background:rgba(14,14,14,.8);border:1px solid var(--border-dim);
  padding:4px 10px;border-radius:20px;
}
</style>
</head>
<body>

<div class="login-container">
  <div class="login-card">

    <!-- Logo -->
    <div class="logo-wrap">
      <div class="logo-hex">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--cyan)" stroke-width="1.8">
          <polygon points="12 2 22 8.5 22 15.5 12 22 2 15.5 2 8.5"/>
          <line x1="12" y1="2" x2="12" y2="22"/>
          <line x1="2" y1="8.5" x2="22" y2="8.5"/>
          <line x1="2" y1="15.5" x2="22" y2="15.5"/>
        </svg>
      </div>
      <div class="logo-text">
        <span class="logo-name">ZGROUP</span>
        <span class="logo-sub">Sistema de Cotizaciones</span>
      </div>
    </div>

    <div class="divider"></div>

    <!-- Form -->
    <form id="loginForm" onsubmit="handleLogin(event)" autocomplete="off">

      <div class="form-group">
        <label class="form-label" for="email">Correo electrónico</label>
        <input
          id="email"
          type="email"
          class="form-input"
          placeholder="usuario@zgroup.pe"
          autocomplete="email"
          required
        >
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Contraseña</label>
        <div class="pwd-wrap">
          <input
            id="password"
            type="password"
            class="form-input"
            placeholder="••••••••"
            autocomplete="current-password"
            style="padding-right:44px"
            required
          >
          <button type="button" class="pwd-toggle" onclick="togglePwd()" title="Mostrar/ocultar contraseña" id="eyeBtn">
            <svg id="eyeIcon" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>

      <button type="submit" class="btn-login" id="btnLogin">
        <span class="btn-label">INGRESAR</span>
      </button>

    </form>

    <!-- Message area -->
    <div id="msgBox" class="msg" role="alert"></div>

    <!-- Footer -->
    <div class="login-footer">
      Sistema de gestión interna — Solo personal ZGROUP
    </div>

  </div>
</div>

<div class="version-badge">v1.0.0</div>

<script>
// ── Verificar si ya hay sesión activa ─────────────────────────
(async function checkSession() {
  try {
    const res = await fetch('/api/auth/refresh', { method: 'POST', credentials: 'include' });
    const json = await res.json();
    if (json.success) {
      // Ya hay sesión activa → redirigir al app
      window.location.href = '/app.html';
    }
  } catch {
    // Sin sesión activa → mostrar login normalmente
  }
})();

// ── Verificar mensaje en URL (ej: ?reason=session_expired) ────
(function checkReason() {
  const params = new URLSearchParams(window.location.search);
  const reason = params.get('reason');
  if (reason === 'session_expired') {
    showMsg('Tu sesión ha expirado. Por favor vuelve a ingresar.', 'warning');
  }
})();

// ── Login handler ─────────────────────────────────────────────
async function handleLogin(e) {
  e.preventDefault();
  clearMsg();

  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn      = document.getElementById('btnLogin');

  btn.disabled = true;
  btn.classList.add('loading');

  try {
    const res = await fetch('/api/auth/login', {
      method:      'POST',
      credentials: 'include',
      headers:     { 'Content-Type': 'application/json' },
      body:        JSON.stringify({ email, password }),
    });

    const json = await res.json();

    if (!json.success) {
      const msg = json?.error?.code === 'TOO_MANY_REQUESTS'
        ? 'Demasiados intentos. Espera 15 minutos antes de reintentar.'
        : 'Credenciales incorrectas. Verifica tu correo y contraseña.';
      showMsg(msg, 'error');
      shakeCard();
      return;
    }

    // Guardar token en sessionStorage solo como referencia temporal
    sessionStorage.setItem('zt', json.data.accessToken);

    // Redirigir según rol
    window.location.href = '/app.html';

  } catch (err) {
    showMsg('Error de conexión. Verifica tu red e intenta nuevamente.', 'error');
  } finally {
    btn.disabled = false;
    btn.classList.remove('loading');
  }
}

// ── Helpers UI ────────────────────────────────────────────────
function showMsg(text, type = 'error') {
  const box = document.getElementById('msgBox');
  box.textContent = text;
  box.className   = `msg ${type} show`;
}
function clearMsg() {
  const box = document.getElementById('msgBox');
  box.className = 'msg';
}

function togglePwd() {
  const input = document.getElementById('password');
  const icon  = document.getElementById('eyeIcon');
  const show  = input.type === 'password';
  input.type  = show ? 'text' : 'password';
  icon.innerHTML = show
    ? `<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>`
    : `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
}

function shakeCard() {
  const card = document.querySelector('.login-card');
  card.style.animation = 'none';
  card.offsetHeight; // reflow
  card.style.animation = 'shake .4s ease';
}

const shakeStyle = document.createElement('style');
shakeStyle.textContent = `
  @keyframes shake {
    0%,100%{transform:translateX(0)}
    20%{transform:translateX(-8px)}
    40%{transform:translateX(8px)}
    60%{transform:translateX(-5px)}
    80%{transform:translateX(5px)}
  }
`;
document.head.appendChild(shakeStyle);

// ── Focus en email al cargar ───────────────────────────────────
window.addEventListener('load', () => {
  document.getElementById('email').focus();
});
</script>
</body>
</html>
