# ZGROUP — API Express + SPA React (imagen multi-stage: npm run build en Docker)
# Uso: docker compose build && docker compose up -d
# App: http://localhost:3000  ·  API: /api/*  ·  Hash routes: #/login, #/dashboard
# MinIO host: API :9010 · consola :9011 (MINIO_*_HOST_PORT) — interno sigue minio:9000

services:

  # ── Node.js: API + estáticos de client/dist (producción; no hay Vite en runtime) ──
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: zgroup-cotizaciones:latest
    container_name: zgroup_app
    restart: unless-stopped
    ports:
      - "${APP_HOST_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: zgroup_cotizaciones
      DB_USER: zgroup_user
      DB_PASSWORD: ${DB_PASSWORD:-zgroup_dev_password}
      JWT_ACCESS_SECRET:  ${JWT_ACCESS_SECRET:-change_this_access_secret_32chars}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change_this_refresh_secret_32chars}
      JWT_ACCESS_EXPIRES:  15m
      JWT_REFRESH_EXPIRES: 7d
      COOKIE_SECURE: "false"
      # Mismo origen que el navegador (SPA + API mismo puerto). En servidor por IP: http://IP:3000
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      # Orígenes extra CORS (coma). Opcional si ya cubre FRONTEND_URL
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-}
      # 1 = sin COOP/COEP (recomendado en HTTP por IP pública; con HTTPS puede dejar 0)
      RELAX_HELMET_HTTP: ${RELAX_HELMET_HTTP:-0}
      # 1 si hay nginx/traefik delante (X-Forwarded-*)
      TRUST_PROXY: ${TRUST_PROXY:-0}
      ADMIN_EMAIL:    ${ADMIN_EMAIL:-admin@zgroup.pe}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-ZGroup2025!}
      S3_ENDPOINT:   http://minio:9000
      # URL que usa el navegador para previsualizar (firma GET). Debe coincidir con MINIO_API_HOST_PORT
      S3_PUBLIC_ENDPOINT: ${S3_PUBLIC_ENDPOINT:-http://localhost:9010}
      S3_BUCKET:     zgroup-plans
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"require('http').get('http://127.0.0.1:3000/api/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\"",
        ]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 45s
    # Desarrollo (solo API, sin reconstruir imagen): descomenta y ejecuta `npm run dev` en el host
    # para Vite :5173. Si montas ./:/app sobrescribes client/dist: vuelve a `npm run build` en el host.
    # volumes:
    #   - ./:/app
    networks:
      - zgroup_net

  # ── PostgreSQL ───────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: zgroup_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       zgroup_cotizaciones
      POSTGRES_USER:     zgroup_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-zgroup_dev_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      # Host:contenedor (evita choque con Postgres local en 5432)
      - "${POSTGRES_HOST_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zgroup_user -d zgroup_cotizaciones"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - zgroup_net

  # ── Redis ────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: zgroup_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      # Host:contenedor (evita choque con Redis local en 6379)
      - "${REDIS_HOST_PORT:-6382}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - zgroup_net

  # ── MinIO (S3-compatible) ────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: zgroup_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER:     ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      # Por defecto 9010/9011 para no chocar con otro servicio en :9000 (p. ej. otro MinIO)
      - "${MINIO_API_HOST_PORT:-9010}:9000"   # S3 API (host)
      - "${MINIO_CONSOLE_HOST_PORT:-9011}:9001"   # Console web (host)
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - zgroup_net

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  zgroup_net:
    driver: bridge
