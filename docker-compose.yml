version: '3.9'

services:

  # ── Node.js API ─────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zgroup_app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: zgroup_cotizaciones
      DB_USER: zgroup_user
      DB_PASSWORD: ${DB_PASSWORD:-zgroup_dev_password}
      JWT_ACCESS_SECRET:  ${JWT_ACCESS_SECRET:-change_this_access_secret_32chars}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change_this_refresh_secret_32chars}
      JWT_ACCESS_EXPIRES:  15m
      JWT_REFRESH_EXPIRES: 7d
      COOKIE_SECURE: "false"
      ADMIN_EMAIL:    ${ADMIN_EMAIL:-admin@zgroup.pe}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-ZGroup2025!}
      S3_ENDPOINT:   http://minio:9000
      S3_BUCKET:     zgroup-plans
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./:/app
      - /app/node_modules
    networks:
      - zgroup_net

  # ── PostgreSQL ───────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: zgroup_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       zgroup_cotizaciones
      POSTGRES_USER:     zgroup_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-zgroup_dev_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zgroup_user -d zgroup_cotizaciones"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - zgroup_net

  # ── Redis ────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: zgroup_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - zgroup_net

  # ── MinIO (S3-compatible) ────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: zgroup_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER:     ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Console web
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - zgroup_net

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  zgroup_net:
    driver: bridge
