# Ejemplo: Apache 2.4 + SSL, proxy a Node en 127.0.0.1:3000
# La app debe construirse con VITE_BASE_PATH=/coti_zgroup/ y PUBLIC_BASE_PATH=/coti_zgroup
# Ajusta ServerName, rutas de certificados y el bloque VirtualHost :80 si rediriges a HTTPS.

<VirtualHost *:443>
    ServerName ztrack.app

    SSLEngine on
    SSLCertificateFile /etc/ssl/certs/ztrack.app.crt
    SSLCertificateKeyFile /etc/ssl/private/ztrack.app.key

    # Opcional: cadena Let's Encrypt
    # SSLCertificateChainFile /etc/ssl/certs/ztrack.app.chain.pem

    ProxyPreserveHost On
    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-For "%{REMOTE_ADDR}s"

    # Sin barra final en Location: redirige /coti_zgroup → /coti_zgroup/
    RedirectMatch ^/coti_zgroup$ /coti_zgroup/

    ProxyPass        /coti_zgroup/ http://127.0.0.1:3000/coti_zgroup/
    ProxyPassReverse /coti_zgroup/ http://127.0.0.1:3000/coti_zgroup/

    # Módulos: a2enmod ssl proxy proxy_http headers
</VirtualHost>
